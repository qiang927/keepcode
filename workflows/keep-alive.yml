name: Keep HF Space Alive
on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分钟执行一次
  workflow_dispatch:          # 也可以手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Space
        run: |
          curl -s -o /dev/null -w "状态码: %{http_code}" \
            https://lls335223-rbKIKI.hf.space
